// Catálogo de municípios. Para adicionar um novo, basta incluir aqui (slug: nome).
// Qualquer slug informado em ?cidade= funciona mesmo sem estar no catálogo.
const CIDADES={
  caceres:"Cáceres-MT",
  araputanga:"Araputanga-MT",
  "reserva-do-cabacal":"Reserva do Cabaçal-MT"
};
function normalizaSlug(s){
  return (s||'').toLowerCase().trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}
const cidadeSlug=normalizaSlug(params.get('cidade'));
const cidadeNome=cidadeSlug?(CIDADES[cidadeSlug]||(cidadeSlug.charAt(0).toUpperCase()+cidadeSlug.slice(1).replace(/-/g,' '))):"";
// Cada município grava no seu próprio nó. Sem cidade definida, usa um nó genérico.
const RKEY = cidadeSlug ? ('quiz_saude_clima/cidades/'+cidadeSlug) : 'quiz_saude_clima/geral';

// Mantém ?cidade= ao gerar links/QR, descartando outros parâmetros (painel etc.)
function urlBase(){
  const u=location.href.split('?')[0];
  return cidadeSlug ? (u+'?cidade='+cidadeSlug) : u;
}
function urlPainel(){
  const sep = urlBase().includes('?') ? '&' : '?';
  return urlBase()+sep+'painel=1';
}

      <p class="sub">Doze perguntas sobre o que acontece no seu quintal, na sua rua e na sua cidade. Cada pessoa responde no seu tempo.</p>
    </div>
    <div class="card">
      ${cidadeNome?`<div class="cidade-selo">${escapeHtml(cidadeNome)}</div>`:''}
      <label for="nm">Seu nome ou apelido</label>
      <input type="text" id="nm" placeholder="Ex: Maria S." maxlength="22" autocomplete="off">
      <button class="btn btn-verde" id="comecar">Começar o quiz</button>
      <button class="btn btn-claro" id="verpainel">Ver resultados do grupo</button>
      <button class="btn btn-claro" id="abrirqr">Mostrar QR code</button>
      ${firebaseOk?'':'<div class="hint">Modo offline: resultados e sugestões desativados (Firebase não configurado).</div>'}
    </div>
    <div class="rodape">${cidadeNome?escapeHtml(cidadeNome):'Cáceres-MT'} · Saúde e mudanças climáticas</div>`;
  document.getElementById('comecar').onclick=()=>{
    const v=document.getElementById('nm').value.trim();
    if(!v){document.getElementById('nm').focus();return;}
    nome=v;idx=0;pontos=0;detalhe=[];irPara(0);
  };
  document.getElementById('verpainel').onclick=telaPainel;
  document.getElementById('abrirqr').onclick=telaQR;
}

function telaEscolheCidade(){
  const botoes=Object.entries(CIDADES).map(([slug,nome])=>
    `<a class="btn btn-verde" style="text-decoration:none;text-align:center" href="${location.href.split('?')[0]}?cidade=${slug}">${escapeHtml(nome)}</a>`
  ).join('');
  app.innerHTML=`
    <div class="topo">
      <span class="tag">Conferência Municipal de Saúde</span>
      <h1>Saúde e Clima: quanto você sabe?</h1>
      <p class="sub">Escolha o seu município para começar. Cada cidade tem o seu próprio quiz e os seus próprios resultados.</p>
    </div>
    <div class="card">
      <label>Selecione o município</label>
      ${botoes}
    </div>
    <div class="rodape">Saúde e mudanças climáticas</div>`;
}

function telaQR(){
  app.innerHTML=`
    <div class="topo"><span class="tag">Compartilhar</span><h1>Aponte a câmera</h1>
    <p class="sub">Cada pessoa abre o quiz de ${escapeHtml(cidadeNome)} no próprio celular.</p></div>
    <div class="card"><div id="qrbox"></div>
    <div class="url-mini">${urlBase()}</div>
    <button class="btn btn-azul" id="voltar">Voltar</button></div>`;
  new QRCode(document.getElementById('qrbox'),{text:urlBase(),width:220,height:220,colorDark:"#127a40",colorLight:"#ffffff"});
  document.getElementById('voltar').onclick=telaInicial;
}

function irPara(novoIdx){
  // mostra intro do bloco quando entra num bloco novo (ou no primeiro)
  if(novoIdx>=PERGUNTAS.length){telaFinal();return;}
  const blocoAtual = PERGUNTAS[novoIdx].bloco;
  const blocoAnterior = novoIdx>0 ? PERGUNTAS[novoIdx-1].bloco : null;
  if(blocoAtual!==blocoAnterior){ idx=novoIdx; telaIntroBloco(); }
  else { idx=novoIdx; telaPergunta(); }
}

function telaIntroBloco(){
  const b=BLOCOS[PERGUNTAS[idx].bloco];
  const numBloco=ORDEM_BLOCOS.indexOf(PERGUNTAS[idx].bloco)+1;
  const qtd=PERGUNTAS.filter(p=>p.bloco===PERGUNTAS[idx].bloco).length;
  app.innerHTML=`
    <div class="card bloco" style="--bcor:${b.cor};--bcoresc:${b.corEsc};--bsuave:${b.suave}">
      <div class="intro-bloco" style="--bcor:${b.cor}">
        <div class="num">Bloco ${numBloco} de ${ORDEM_BLOCOS.length}</div>
        <h2>${b.nome}</h2>
        <p>${b.sub}</p>
        <div class="qtd">${qtd} ${qtd===1?'pergunta':'perguntas'}</div>
      </div>
      <button class="btn btn-bloco" id="iniciarbloco" style="--bcor:${b.cor}">Começar este bloco</button>
    </div>
    <div class="rodape">Pontos: ${pontos}</div>`;
  document.getElementById('iniciarbloco').onclick=telaPergunta;
}

function telaPergunta(){
  respondeu=false;
  const p=PERGUNTAS[idx];
  const b=BLOCOS[p.bloco];
  const pct=Math.round((idx/PERGUNTAS.length)*100);
  const nivelTxt={facil:"Fácil",medio:"Médio",dificil:"Difícil"}[p.nivel];
  app.innerHTML=`
    <div class="card bloco" style="--bcor:${b.cor};--bcoresc:${b.corEsc};--bsuave:${b.suave}">
      <div class="progresso">
        <span class="bloco-chip" style="--bcor:${b.cor}">${b.nome}</span>
        <span class="nivel n-${p.nivel}">${nivelTxt}</span>
      </div>
      <div class="barra"><span class="bfill" style="--bcor:${b.cor};width:${pct}%"></span></div>
      <p class="pergunta" style="margin-top:16px">${p.q}</p>
      <div class="opcoes" id="ops"></div>
      <div class="explica bexp" id="exp" style="--bcor:${b.cor};--bcoresc:${b.corEsc}"></div>
      <button class="btn btn-bloco" id="prox" style="--bcor:${b.cor};display:none">${idx+1<PERGUNTAS.length?'Próxima':'Ver meu resultado'}</button>
    </div>
    <div class="rodape">Pergunta ${idx+1} de ${PERGUNTAS.length} · Pontos: ${pontos}</div>`;
  const cont=document.getElementById('ops');
  p.ops.forEach((txt,i)=>{
    const btn=document.createElement('button');
    btn.className='opcao';btn.textContent=txt;
    btn.onclick=()=>responder(i,btn);cont.appendChild(btn);
  });
}

function responder(i,btn){
  if(respondeu)return;respondeu=true;
  const p=PERGUNTAS[idx];
  [...document.querySelectorAll('.opcao')].forEach((b,j)=>{
    b.classList.add('bloqueada');
    if(j===p.correta){b.classList.add('certa');b.classList.add('bsel');}
    else if(j===i)b.classList.add('errada');
    else b.classList.add('atenuada');
  });
  const acertou = (i===p.correta);
  if(acertou)pontos++;
  detalhe.push({nivel:p.nivel,tema:p.tema,bloco:p.bloco,acertou:acertou});
  const exp=document.getElementById('exp');
  exp.innerHTML=(acertou?'<b>Correto.</b> ':'<b>A resposta certa está destacada.</b> ')+p.explica+
    (p.fonte?`<span class="fonte">Fonte: ${p.fonte}</span>`:'');
  exp.classList.add('show');
  const prox=document.getElementById('prox');
  prox.style.display='block';
  prox.onclick=()=>irPara(idx+1);
}

function faixa(p){
  const r=p/PERGUNTAS.length;
  if(r>=0.85)return{txt:"Você manja muito de saúde e clima",cor:"var(--verde-esc)"};
  if(r>=0.6)return{txt:"Bom conhecimento, dá pra ir além",cor:"var(--azul)"};
  if(r>=0.4)return{txt:"Você sabe o básico, vale aprofundar",cor:"var(--laranja)"};
  return{txt:"Tema novo pra você, ótima hora de aprender",cor:"var(--vermelho)"};
}

function telaFinal(){
  const f=faixa(pontos);
  const meuPct=Math.round(pontos/PERGUNTAS.length*100);
  app.innerHTML=`
    <div class="card placar-final">
      <span class="tag" style="background:var(--suave);color:var(--verde-esc);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600">Seu resultado</span>
      <div class="nota">${pontos}/${PERGUNTAS.length}</div>
      <div class="faixa" style="color:${f.cor}">${f.txt}</div>
      <p class="sub" style="margin-top:6px">${escapeHtml(nome)}, obrigado por participar.</p>
      <div id="salvomsg" class="hint"></div>
    </div>
    <div class="card">
      <div class="secao-tit" style="margin-top:0">Você e o grupo</div>
      <div class="comp-linha">
        <div class="comp-box"><div class="comp-v" style="color:var(--verde-esc)">${meuPct}%</div><div class="comp-l">seu acerto</div></div>
        <div class="comp-box"><div class="comp-v" id="grupoPct" style="color:var(--azul)">--</div><div class="comp-l">média do grupo</div></div>
        <div class="comp-box"><div class="comp-v" id="grupoN" style="color:var(--cinza)">--</div><div class="comp-l">participantes</div></div>
      </div>
      <div id="compMsg" class="hint" style="text-align:left"></div>
    </div>
    <div class="card">
      <label for="sug">Deixe uma sugestão para a conferência (opcional)</label>
      <textarea id="sug" maxlength="280" placeholder="Ex: mais árvores na praça do meu bairro, limpeza dos córregos..."></textarea>
      <button class="btn btn-azul" id="enviarsug">Enviar sugestão</button>
      <div id="sugmsg" class="hint"></div>
    </div>
    <button class="btn btn-claro" id="verpainel">Ver resultados do grupo</button>
    <button class="btn btn-verde" id="dnovo">Jogar de novo</button>
    <div class="rodape">Conferência Municipal de Saúde${cidadeNome?(' · '+escapeHtml(cidadeNome)):''}</div>`;
  document.getElementById('dnovo').onclick=telaInicial;
  document.getElementById('verpainel').onclick=telaPainel;
  document.getElementById('enviarsug').onclick=enviarSugestao;
  if(firebaseOk)salvarResultado();
  else { document.getElementById('salvomsg').textContent='Modo offline: resultado não registrado.';
         document.getElementById('compMsg').textContent='Sem conexão, não dá para comparar com o grupo.'; }
}

function mostrarComparacao(){
  const max=PERGUNTAS.length;
  db.ref(RKEY+'/participantes').once('value',snap=>{
    const arr=[];snap.forEach(c=>arr.push(c.val()));
    const n=arr.length;
    if(!n){return;}
    const mediaPct=Math.round(arr.reduce((s,p)=>s+p.pontos,0)/n/max*100);
    const meuPct=Math.round(pontos/max*100);
    const gp=document.getElementById('grupoPct'), gn=document.getElementById('grupoN'), msg=document.getElementById('compMsg');
    if(gp)gp.textContent=mediaPct+'%';
    if(gn)gn.textContent=n;
    if(msg){
      if(n===1) msg.textContent='Você é a primeira pessoa a participar. Conforme mais gente responde, a média do grupo aparece aqui.';
      else if(meuPct>mediaPct) msg.textContent='Você acertou acima da média do grupo.';
      else if(meuPct<mediaPct) msg.textContent='Você ficou abaixo da média do grupo, vale revisar os temas.';
      else msg.textContent='Você acertou exatamente na média do grupo.';
    }
  });
}

function salvarResultado(){
  const porNivel={facil:{a:0,t:0},medio:{a:0,t:0},dificil:{a:0,t:0}};
  const porTema={};
  const porBloco={};
  detalhe.forEach(d=>{
    porNivel[d.nivel].t++; if(d.acertou)porNivel[d.nivel].a++;
    if(!porTema[d.tema])porTema[d.tema]={a:0,t:0};
    porTema[d.tema].t++; if(d.acertou)porTema[d.tema].a++;
    if(!porBloco[d.bloco])porBloco[d.bloco]={a:0,t:0};
    porBloco[d.bloco].t++; if(d.acertou)porBloco[d.bloco].a++;
  });
  db.ref(RKEY+'/participantes').push({nome:nome,pontos:pontos,total:PERGUNTAS.length,nivel:porNivel,tema:porTema,bloco:porBloco,ts:Date.now()})
    .then(()=>{document.getElementById('salvomsg').textContent='Seu resultado entrou nas estatísticas do grupo.';mostrarComparacao();})
    .catch(()=>{document.getElementById('salvomsg').textContent='Não foi possível registrar agora.';});
}

function enviarSugestao(){
  const t=document.getElementById('sug').value.trim();
  if(!t){document.getElementById('sug').focus();return;}
  if(!firebaseOk){document.getElementById('sugmsg').textContent='Modo offline: sugestão não enviada.';return;}
  db.ref(RKEY+'/sugestoes').push({nome:nome,texto:t,ts:Date.now()})
    .then(()=>{document.getElementById('sug').value='';document.getElementById('sugmsg').textContent='Sugestão enviada. Obrigado!';
      document.getElementById('enviarsug').disabled=true;})
    .catch(()=>{document.getElementById('sugmsg').textContent='Não foi possível enviar agora.';});
}

function telaPainel(){
  app.innerHTML=`
    <div class="topo"><span class="tag">Resultados do evento</span>
      <h1>Saúde e Clima${cidadeNome?(' em '+escapeHtml(cidadeNome)):''}</h1>
      <p class="sub">Atualiza sozinho conforme as pessoas participam.</p></div>
    <div class="card" id="boxstats"><div class="hint">Carregando...</div></div>
    <div class="card"><div class="secao-tit">Desempenho por bloco</div>
      <p class="hint" style="text-align:left;margin:2px 0 0">Percentual médio de acerto em cada bloco temático.</p>
      <div id="boxblocos"></div></div>
    <div class="card"><div class="secao-tit">Acertos por nível de dificuldade</div>
      <p class="hint" style="text-align:left;margin:2px 0 0">Percentual médio de acerto em cada nível.</p>
      <div id="boxniveis"></div></div>
    <div class="card"><div class="secao-tit">Conhecimento por tema</div>
      <p class="hint" style="text-align:left;margin:2px 0 0">Onde o público está mais forte e onde precisa de atenção.</p>
      <div id="boxtemas"></div></div>
    <div class="card"><div class="secao-tit">Distribuição das notas</div>
      <p class="hint" style="text-align:left;margin:2px 0 0">Quantas pessoas tiraram cada nota, de 0 a ${PERGUNTAS.length}.</p>
      <div class="grafico" id="boxgraf"></div></div>
    <div class="card"><div class="secao-tit">Nuvem de sugestões</div>
      <div class="nuvem" id="boxnuvem"></div>
      <div class="secao-tit" style="margin-top:18px">Mural de sugestões</div>
      <div id="boxsug"></div></div>
    ${modoPainel?'':'<button class="btn btn-claro" id="voltar">Voltar ao início</button>'}
    <div class="rodape">Conferência Municipal de Saúde${cidadeNome?(' · '+escapeHtml(cidadeNome)):''}</div>`;
  if(!modoPainel)document.getElementById('voltar').onclick=telaInicial;
  if(!firebaseOk){
    document.getElementById('boxstats').innerHTML='<div class="erro-cfg">Configure o Firebase para ver os resultados do evento.</div>';
    return;
  }
  db.ref(RKEY+'/participantes').on('value',snap=>{
    const arr=[];snap.forEach(c=>arr.push(c.val()));
    renderStats(arr);renderBlocos(arr);renderNiveis(arr);renderTemas(arr);renderGrafico(arr);
  });
  db.ref(RKEY+'/sugestoes').on('value',snap=>{
    const arr=[];snap.forEach(c=>arr.push(c.val()));
    renderNuvem(arr);renderSugestoes(arr);
  });
}

function renderStats(arr){
  const n=arr.length;
  const max=PERGUNTAS.length;
  const media=n?(arr.reduce((s,p)=>s+p.pontos,0)/n):0;
  const bons=arr.filter(p=>p.pontos/max>=0.6).length;
  const pctMedio=n?Math.round(media/max*100):0;
  const aviso = n===1 ? '<div class="hint" style="margin-top:12px">Apenas 1 participante até agora. Os percentuais refletem essa única pessoa e vão se ajustar conforme o grupo cresce.</div>' : (n===0?'<div class="hint" style="margin-top:12px">Ainda sem participantes.</div>':'');
  document.getElementById('boxstats').innerHTML=`
    <div class="stat-linha">
      <div class="stat"><div class="v">${n}</div><div class="l">participantes</div></div>
      <div class="stat"><div class="v">${pctMedio}%</div><div class="l">acerto médio do grupo</div></div>
      <div class="stat"><div class="v">${n?Math.round(bons/n*100):0}%</div><div class="l">acertaram 60%+</div></div>
    </div>${aviso}`;
}

function renderBlocos(arr){
  const ac={};
  ORDEM_BLOCOS.forEach(k=>ac[k]={a:0,t:0});
  arr.forEach(p=>{
    if(!p.bloco)return;
    Object.keys(p.bloco).forEach(k=>{
      if(!ac[k])ac[k]={a:0,t:0};
      ac[k].a+=p.bloco[k].a||0;ac[k].t+=p.bloco[k].t||0;
    });
  });
  const html=ORDEM_BLOCOS.map(k=>{
    const b=BLOCOS[k];const v=ac[k];
    const pc=v.t?Math.round(v.a/v.t*100):0;
    return `<div class="bloco-result" style="--bcor:${b.cor};--bsuave:${b.suave};--bcoresc:${b.corEsc}">
      <div class="br-topo"><span class="br-nome">${b.nome}</span><span class="br-pc">${pc}%</span></div>
      <div class="br-trilho"><div class="br-fill" style="width:${pc}%"></div></div>
      <div class="br-det">${v.a} de ${v.t} acertos</div>
    </div>`;
  }).join('');
  document.getElementById('boxblocos').innerHTML=html;
}

function renderNiveis(arr){
  const ac={facil:{a:0,t:0},medio:{a:0,t:0},dificil:{a:0,t:0}};
  arr.forEach(p=>{
    if(!p.nivel)return;
    ['facil','medio','dificil'].forEach(k=>{
      if(p.nivel[k]){ac[k].a+=p.nivel[k].a||0;ac[k].t+=p.nivel[k].t||0;}
    });
  });
  const pc=k=>ac[k].t?Math.round(ac[k].a/ac[k].t*100):0;
  document.getElementById('boxniveis').innerHTML=`
    <div class="nivel-grid">
      <div class="nivel-box b"><div class="pc">${pc('facil')}%</div><div class="nm">Básico</div><div class="det">${ac.facil.a}/${ac.facil.t} acertos</div></div>
      <div class="nivel-box m"><div class="pc">${pc('medio')}%</div><div class="nm">Médio</div><div class="det">${ac.medio.a}/${ac.medio.t} acertos</div></div>
      <div class="nivel-box av"><div class="pc">${pc('dificil')}%</div><div class="nm">Avançado</div><div class="det">${ac.dificil.a}/${ac.dificil.t} acertos</div></div>
    </div>`;
}

function corPct(p){ if(p>=70)return'#1b9e54'; if(p>=45)return'#f0a830'; return'#e0463a'; }
function renderTemas(arr){
  const ac={};
  arr.forEach(p=>{
    if(!p.tema)return;
    Object.keys(p.tema).forEach(k=>{
      if(!ac[k])ac[k]={a:0,t:0};
      ac[k].a+=p.tema[k].a||0;ac[k].t+=p.tema[k].t||0;
    });
  });
  const linhas=Object.entries(ac).map(([k,v])=>({tema:k,pc:v.t?Math.round(v.a/v.t*100):0,a:v.a,t:v.t}))
    .sort((a,b)=>b.pc-a.pc);
  if(!linhas.length){document.getElementById('boxtemas').innerHTML='<div class="hint">Sem dados ainda.</div>';return;}
  document.getElementById('boxtemas').innerHTML=linhas.map(l=>`
    <div class="tema-linha">
      <div class="tema-topo"><span class="tt">${escapeHtml(l.tema)}</span><span class="tp">${l.pc}%</span></div>
      <div class="tema-trilho"><div class="tema-fill" style="width:${l.pc}%;background:${corPct(l.pc)}"></div></div>
    </div>`).join('');
}

function renderGrafico(arr){
  const max=PERGUNTAS.length;
  const cont=Array(max+1).fill(0);
  arr.forEach(p=>{if(p.pontos>=0&&p.pontos<=max)cont[p.pontos]++;});
  const maior=Math.max(1,...cont);
  let html='';
  for(let i=max;i>=0;i--){
    const w=Math.round(cont[i]/maior*100);
    html+=`<div class="gbar-linha"><div class="gbar-rot">${i}/${max}</div>
      <div class="gbar-trilho"><div class="gbar-fill" style="width:${w}%"></div></div>
      <div class="gbar-num">${cont[i]}</div></div>`;
  }
  document.getElementById('boxgraf').innerHTML=html||'<div class="hint">Sem dados ainda.</div>';
}

const STOP=new Set(['a','o','as','os','de','da','do','das','dos','e','em','no','na','nos','nas','um','uma','para','pra','por','com','que','mais','meu','minha','se','ao','aos','é','the','of','sua','seu','tem','ter','muito','isso','esse','essa','mas','não','nao','só','sao','são','dos','nas','como','onde','quando','também','tambem','toda','todo','todas','todos','ser','estar','foi','tão','tao','até','ate','sem','sobre']);
function renderNuvem(arr){
  // conta cada palavra UMA vez por sugestão, para uma pessoa não inflar um termo repetindo-o
  const freq={};
  arr.forEach(s=>{
    const vistas=new Set();
    (s.texto||'').toLowerCase().replace(/[.,;:!?()"]/g,' ').split(/\s+/).forEach(w=>{
      w=w.trim();
      if(w.length>=4 && !STOP.has(w)) vistas.add(w);
    });
    vistas.forEach(w=>{freq[w]=(freq[w]||0)+1;});
  });
  const pares=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,30);
  if(!pares.length){document.getElementById('boxnuvem').innerHTML='<div class="hint">Sem sugestões ainda.</div>';return;}
  const maxf=pares[0][1];
  const minf=pares[pares.length-1][1];
  document.getElementById('boxnuvem').innerHTML=pares.map(([w,f])=>{
    // só varia o tamanho quando há diferença real de frequência entre as palavras
    let t;
    if(maxf===minf) t=0;                       // todas iguais: tamanho uniforme
    else t=(f-minf)/(maxf-minf);               // normaliza 0..1
    const size=17+Math.round(t*17);            // 17px a 34px, faixa mais suave
    const op=0.7+0.3*t;
    return `<span style="font-size:${size}px;opacity:${op.toFixed(2)}">${escapeHtml(w)} <span style="font-size:11px;opacity:.6;font-weight:400">${f>1?'('+f+')':''}</span></span>`;
  }).join('');
}

function renderSugestoes(arr){
  const ord=arr.slice().sort((a,b)=>b.ts-a.ts).slice(0,40);
  if(!ord.length){document.getElementById('boxsug').innerHTML='<div class="hint">Sem sugestões ainda.</div>';return;}
  document.getElementById('boxsug').innerHTML=ord.map(s=>
    `<div class="sugcard">${escapeHtml(s.texto)}<span class="fonte">— ${escapeHtml(s.nome||'anônimo')}</span></div>`).join('');
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

if(modoPainel)telaPainel();else telaInicial();
</script>
