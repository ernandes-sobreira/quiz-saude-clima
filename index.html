<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Saúde e Clima | Conferência Municipal de Saúde</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --verde:#1b9e54;--verde-esc:#127a40;--azul:#1f7ae0;--laranja:#f08a24;
    --vermelho:#e0463a;--cinza:#5a6470;--fundo:#ffffff;--suave:#f4f7f5;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--fundo);color:#1d2630;line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:600px;margin:0 auto;padding:24px 18px 60px;min-height:100vh;}
  .topo{text-align:center;padding:18px 0 8px;}
  .topo .tag{display:inline-block;background:var(--suave);color:var(--verde-esc);font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:6px 14px;border-radius:20px;margin-bottom:14px;}
  h1{font-size:26px;color:var(--verde-esc);margin-bottom:6px;line-height:1.2;}
  .sub{color:var(--cinza);font-size:15px;max-width:440px;margin:0 auto;}
  .card{background:#fff;border:1px solid #e6ece8;border-radius:16px;padding:22px;margin-top:22px;box-shadow:0 2px 10px rgba(27,158,84,.06);}
  label{display:block;font-size:13px;font-weight:600;color:var(--cinza);margin-bottom:6px;}
  input[type=text],textarea{width:100%;padding:13px 14px;border:1.5px solid #d8e0db;border-radius:10px;font-size:16px;outline:none;transition:border .15s;font-family:inherit;}
  input[type=text]:focus,textarea:focus{border-color:var(--verde);}
  textarea{resize:vertical;min-height:90px;}
  .btn{display:block;width:100%;border:none;border-radius:11px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;transition:transform .08s,opacity .15s;margin-top:16px;}
  .btn:active{transform:scale(.98);}
  .btn-verde{background:var(--verde);color:#fff;}
  .btn-azul{background:var(--azul);color:#fff;}
  .btn-claro{background:var(--suave);color:var(--verde-esc);}
  .btn:disabled{opacity:.5;cursor:default;}
  .progresso{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:13px;color:var(--cinza);font-weight:600;}
  .barra{height:7px;background:var(--suave);border-radius:6px;overflow:hidden;margin-top:10px;}
  .barra span{display:block;height:100%;background:var(--verde);transition:width .3s;}
  .nivel{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:.4px;}
  .n-facil{background:#e3f6ea;color:var(--verde-esc);}
  .n-medio{background:#fdf0dd;color:#b9690e;}
  .n-dificil{background:#fbe2df;color:#b32d22;}
  .tema{font-size:11px;color:var(--cinza);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:14px;}
  .cidade-selo{display:inline-block;background:var(--suave);color:var(--verde-esc);font-weight:700;font-size:13px;padding:7px 16px;border-radius:18px;margin-bottom:16px;}
  .comp-linha{display:flex;gap:12px;margin:14px 0 6px;}
  .comp-box{flex:1;background:var(--suave);border-radius:12px;padding:14px 8px;text-align:center;}
  .comp-v{font-size:26px;font-weight:800;line-height:1;}
  .comp-l{font-size:11.5px;color:var(--cinza);margin-top:6px;}
  /* blocos */
  .card.bloco{border-top:6px solid var(--bcor,#1b9e54);}
  .bloco-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:4px 11px;border-radius:14px;color:#fff;background:var(--bcor,#1b9e54);}
  .barra span.bfill{background:var(--bcor,#1b9e54);}
  .opcao.certa.bsel{border-color:var(--bcor);background:var(--bsuave);color:var(--bcoresc);}
  .explica.bexp{border-left-color:var(--bcor);}
  .explica.bexp b{color:var(--bcoresc);}
  .btn-bloco{background:var(--bcor,#1b9e54);color:#fff;}
  /* tela de intro de bloco */
  .intro-bloco{text-align:center;padding:30px 16px;border-radius:18px;color:#fff;background:var(--bcor);box-shadow:0 6px 20px rgba(0,0,0,.12);}
  .intro-bloco .num{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.9;}
  .intro-bloco h2{font-size:30px;margin:10px 0 6px;line-height:1.15;}
  .intro-bloco p{font-size:15px;opacity:.95;max-width:340px;margin:0 auto;}
  .intro-bloco .qtd{margin-top:16px;font-size:13px;font-weight:600;background:rgba(255,255,255,.2);display:inline-block;padding:6px 14px;border-radius:16px;}
  .pergunta{font-size:19px;font-weight:600;margin:6px 0 20px;line-height:1.35;}
  .opcoes{display:flex;flex-direction:column;gap:11px;}
  .opcao{text-align:left;background:#fff;border:1.5px solid #d8e0db;border-radius:12px;padding:14px 16px;font-size:15.5px;cursor:pointer;transition:border .12s,background .12s;line-height:1.35;}
  .opcao:hover{border-color:var(--verde);background:var(--suave);}
  .opcao.certa{border-color:var(--verde);background:#e7f7ee;color:var(--verde-esc);font-weight:600;}
  .opcao.errada{border-color:var(--vermelho);background:#fcebe9;color:#a8281d;}
  .opcao.bloqueada{cursor:default;pointer-events:none;}
  .opcao.atenuada{opacity:.5;}
  .explica{margin-top:18px;background:var(--suave);border-left:4px solid var(--verde);border-radius:8px;padding:14px 16px;font-size:14.5px;color:#2c3a42;display:none;}
  .explica.show{display:block;}
  .explica b{color:var(--verde-esc);}
  .fonte{display:block;margin-top:8px;font-size:12px;color:var(--cinza);}
  .placar-final{text-align:center;}
  .placar-final .nota{font-size:54px;font-weight:800;color:var(--verde-esc);line-height:1;margin:10px 0;}
  .placar-final .faixa{font-size:17px;font-weight:600;margin-bottom:8px;}
  #qrbox{display:flex;justify-content:center;padding:16px;background:#fff;border-radius:12px;}
  .url-mini{font-size:12px;color:var(--cinza);word-break:break-all;text-align:center;margin-top:10px;}
  .hint{font-size:12.5px;color:var(--cinza);margin-top:10px;text-align:center;}
  .erro-cfg{background:#fcebe9;color:#a8281d;padding:14px;border-radius:10px;font-size:14px;margin-top:16px;}
  .rodape{text-align:center;font-size:12px;color:#9aa6ad;margin-top:30px;}
  .stat-linha{display:flex;gap:12px;margin-top:16px;}
  .stat{flex:1;background:var(--suave);border-radius:12px;padding:16px 10px;text-align:center;}
  .stat .v{font-size:30px;font-weight:800;color:var(--verde-esc);line-height:1;}
  .stat .l{font-size:12px;color:var(--cinza);margin-top:6px;}
  .grafico{margin-top:8px;}
  .gbar-linha{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px;}
  .gbar-rot{width:48px;text-align:right;color:var(--cinza);font-weight:600;flex-shrink:0;}
  .gbar-trilho{flex:1;background:var(--suave);border-radius:6px;height:22px;overflow:hidden;}
  .gbar-fill{height:100%;background:var(--verde);border-radius:6px;transition:width .5s;min-width:2px;}
  .gbar-num{width:34px;font-weight:700;color:var(--verde-esc);flex-shrink:0;}
  .nuvem{display:flex;flex-wrap:wrap;gap:8px 12px;justify-content:center;align-items:center;padding:8px 0 4px;line-height:1.2;}
  .nuvem span{color:var(--verde-esc);font-weight:700;}
  .sugcard{background:var(--suave);border-radius:10px;padding:11px 14px;margin:8px 0;font-size:14px;color:#2c3a42;border-left:3px solid var(--azul);}
  .secao-tit{font-size:16px;color:var(--verde-esc);font-weight:700;margin:24px 0 4px;}
  .nivel-grid{display:flex;gap:12px;margin-top:14px;}
  .nivel-box{flex:1;border-radius:14px;padding:16px 12px;text-align:center;color:#fff;}
  .nivel-box.b{background:linear-gradient(135deg,#1b9e54,#127a40);}
  .nivel-box.m{background:linear-gradient(135deg,#f0a830,#d97a0c);}
  .nivel-box.av{background:linear-gradient(135deg,#e0463a,#b32d22);}
  .nivel-box .pc{font-size:32px;font-weight:800;line-height:1;}
  .nivel-box .nm{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:6px;opacity:.95;}
  .nivel-box .det{font-size:11px;margin-top:4px;opacity:.85;}
  .tema-linha{margin:12px 0;}
  .tema-topo{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:5px;}
  .tema-topo .tt{font-weight:600;color:#2c3a42;}
  .tema-topo .tp{font-weight:700;color:var(--verde-esc);}
  .tema-trilho{height:14px;background:var(--suave);border-radius:7px;overflow:hidden;}
  .tema-fill{height:100%;border-radius:7px;transition:width .6s;}
  .bloco-result{background:var(--bsuave);border-left:5px solid var(--bcor);border-radius:12px;padding:13px 15px;margin:12px 0;}
  .br-topo{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
  .br-nome{font-weight:700;color:var(--bcoresc);font-size:14.5px;}
  .br-pc{font-weight:800;color:var(--bcoresc);font-size:18px;}
  .br-trilho{height:12px;background:#fff;border-radius:6px;overflow:hidden;}
  .br-fill{height:100%;background:var(--bcor);border-radius:6px;transition:width .6s;}
  .br-det{font-size:12px;color:var(--cinza);margin-top:5px;}
  /* mentimeter participante */
  .escala-val{font-size:46px;font-weight:800;text-align:center;color:#127a40;line-height:1;margin:6px 0 4px;}
  .escala-ext{display:flex;justify-content:space-between;font-size:12px;color:var(--cinza);margin-top:4px;}
  .radar-item{display:flex;align-items:center;gap:10px;margin:9px 0;}
  .radar-rot{width:84px;font-size:13.5px;font-weight:600;color:#2c3a42;flex-shrink:0;}
  .radar-item input{flex:1;}
  .radar-num{width:22px;text-align:right;font-weight:700;color:#0f9b8e;}
  /* mentimeter telão */
  .menti-nuvem{display:flex;flex-wrap:wrap;gap:6px 16px;justify-content:center;align-items:center;padding:14px 4px;}
  .mb-linha{display:flex;align-items:center;gap:10px;margin:10px 0;font-size:14px;}
  .mb-rot{width:130px;flex-shrink:0;color:#2c3a42;font-weight:600;}
  .mb-trilho{flex:1;background:var(--suave);border-radius:7px;height:26px;overflow:hidden;}
  .mb-fill{height:100%;border-radius:7px;transition:width .5s;min-width:2px;}
  .mb-num{width:74px;flex-shrink:0;font-weight:700;color:#2c3a42;font-size:13px;}
  .pz-wrap{display:flex;gap:18px;align-items:center;flex-wrap:wrap;justify-content:center;}
  .pz-svg{width:200px;height:200px;flex-shrink:0;}
  .pz-legs{flex:1;min-width:160px;}
  .pz-leg{display:flex;align-items:center;gap:8px;font-size:14px;margin:7px 0;color:#2c3a42;}
  .pz-cor{width:14px;height:14px;border-radius:3px;flex-shrink:0;}
  .es-media{font-size:40px;font-weight:800;text-align:center;margin-bottom:10px;}
  .es-media span{font-size:14px;font-weight:600;color:var(--cinza);}
  .es-graf{display:flex;align-items:flex-end;gap:5px;height:150px;padding-top:8px;}
  .es-col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%;}
  .es-bar{width:100%;border-radius:5px 5px 0 0;min-height:2px;transition:height .5s;}
  .es-rot{font-size:11px;color:var(--cinza);margin-top:5px;}
  .rd-svg{width:100%;max-width:300px;display:block;margin:0 auto;}
  .rd-legs{display:flex;flex-wrap:wrap;gap:6px 16px;justify-content:center;margin-top:10px;font-size:13.5px;color:#2c3a42;}
  .rd-leg b{color:#0f9b8e;}
  /* apresentador */
  .adm-nav{display:flex;gap:10px;}
  .adm-nav .btn{margin-top:0;}
  .adm-q{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#fff;border:1.5px solid #d8e0db;border-radius:11px;padding:11px 13px;margin:8px 0;cursor:pointer;font-size:14px;}
  .adm-q.ativa{border-color:#127a40;background:#e7f7ee;}
  .adm-n{width:24px;height:24px;border-radius:50%;background:#127a40;color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .adm-t{flex:1;color:#2c3a42;}
  .adm-tipo{font-size:11px;text-transform:uppercase;color:var(--cinza);font-weight:700;}
  /* dois cards de escolha na tela inicial */
  .card-escolha{display:flex;align-items:center;gap:14px;background:#fff;border:1.5px solid #e6ece8;border-radius:16px;padding:20px;margin-top:16px;cursor:pointer;transition:transform .08s,box-shadow .15s,border-color .15s;box-shadow:0 2px 10px rgba(0,0,0,.04);}
  .card-escolha:active{transform:scale(.985);}
  .card-menti{border-left:6px solid #8a4fd6;}
  .card-menti:hover{border-color:#8a4fd6;box-shadow:0 4px 16px rgba(138,79,214,.16);}
  .card-quiz{border-left:6px solid #1b9e54;}
  .card-quiz:hover{border-color:#1b9e54;box-shadow:0 4px 16px rgba(27,158,84,.16);}
  .ce-icone{font-size:34px;line-height:1;flex-shrink:0;}
  .ce-txt{flex:1;}
  .ce-tit{font-size:19px;font-weight:800;color:#1d2630;margin-bottom:3px;}
  .ce-sub{font-size:13.5px;color:var(--cinza);line-height:1.4;}
  .ce-seta{font-size:30px;color:#c2ccc6;font-weight:700;flex-shrink:0;}
  .acoes-sec{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap;}
  .link-sec{background:none;border:none;color:var(--verde-esc);font-size:14px;font-weight:600;cursor:pointer;padding:8px 12px;border-radius:8px;}
  .link-sec:hover{background:var(--suave);}
  .qr-tit{font-size:18px;font-weight:800;text-align:center;margin-bottom:4px;}
  /* dois cards: lado a lado no desktop, empilhado no celular */
  .dois-cards{display:flex;flex-direction:column;gap:16px;margin-top:8px;}
  .card-grande{background:#fff;border:1px solid #e6ece8;border-radius:18px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.05);display:flex;flex-direction:column;}
  .card-g-quiz{border-top:6px solid #1b9e54;}
  .card-g-menti{border-top:6px solid #8a4fd6;}
  .cg-icone{font-size:40px;line-height:1;margin-bottom:10px;}
  .cg-tit{font-size:22px;font-weight:800;color:#1d2630;margin-bottom:6px;}
  .cg-sub{font-size:14px;color:var(--cinza);line-height:1.45;}
  .btn-menti{background:#8a4fd6;color:#fff;margin-top:auto;}
  @media(min-width:760px){
    .wrap:has(.dois-cards){max-width:880px;}
    .dois-cards{flex-direction:row;align-items:stretch;}
    .dois-cards>.card-grande{flex:1;}
  }
</style>
</head>

const PERGUNTAS = [
  // ---------- BLOCO FOGO E AR ----------
  {nivel:"facil",tema:"Queima de quintal",bloco:"fogo",

   correta:1,

   ops:[

     "Porque a vegetação ressecada pega fogo fácil e as chamas escapam do controle",
     "Porque na seca o fogo queima mais devagar e dura vários dias"]},
  // ---------- BLOCO CIDADE VERDE ----------
  {nivel:"facil",tema:"Praça arborizada",bloco:"verde",

   correta:3,
   explica:"A sombra das árvores baixa a temperatura embaixo delas em vários graus. Isso reduz o risco de mal-estar, insolação e desidratação em quem usa a praça no calor.",
   ops:[
     "As árvores eliminam por completo o risco de qualquer doença respiratória",

   correta:2,
   explica:"O Estatuto da Cidade prevê que o planejamento urbano inclua áreas verdes, e o cuidado com a arborização de ruas e praças é atribuição do município, não de cada morador isolado.",

   ops:[
     "É proibido plantar árvores em calçadas, isso cabe apenas ao morador",

  {nivel:"medio",tema:"Incentivo verde",bloco:"verde",
   q:"Em várias cidades do Brasil existe o chamado IPTU verde. O que um morador ganha com ele?",
   correta:1,
   explica:"O IPTU verde concede desconto no imposto a quem mantém práticas sustentáveis no imóvel, como conservar árvores ou captar água da chuva. O percentual muda conforme a cidade.",
   fonte:"Programas municipais de IPTU verde (ex: São Paulo, Salvador, Belo Horizonte). Percentuais variam por município.",
   ops:[
     "Paga mais imposto se tiver árvores ocupando espaço no terreno",
     "Ganha desconto no imposto por manter árvores ou captar água da chuva",

     "Fica isento de todos os impostos da casa por tempo indeterminado"]},
  // ---------- BLOCO ÁGUA ----------

  caceres:"Cáceres-MT",
  araputanga:"Araputanga-MT",
  "reserva-do-cabacal":"Reserva do Cabaçal-MT"
};
function normalizaSlug(s){
  return (s||'').toLowerCase().trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}
const cidadeSlug=normalizaSlug(params.get('cidade'));
const cidadeNome=cidadeSlug?(CIDADES[cidadeSlug]||(cidadeSlug.charAt(0).toUpperCase()+cidadeSlug.slice(1).replace(/-/g,' '))):"";
// Cada município grava no seu próprio nó. Sem cidade definida, usa um nó genérico.
const RKEY = cidadeSlug ? ('quiz_saude_clima/cidades/'+cidadeSlug) : 'quiz_saude_clima/geral';

// Mantém ?cidade= ao gerar links/QR, descartando outros parâmetros (painel etc.)
function urlBase(){
  const u=location.href.split('?')[0];
  return cidadeSlug ? (u+'?cidade='+cidadeSlug) : u;
}
function urlPainel(){
  const sep = urlBase().includes('?') ? '&' : '?';
  return urlBase()+sep+'painel=1';
}

function irPara(novoIdx){
  // mostra intro do bloco quando entra num bloco novo (ou no primeiro)
  if(novoIdx>=PERGUNTAS.length){telaFinal();return;}
  const blocoAtual = PERGUNTAS[novoIdx].bloco;
  const blocoAnterior = novoIdx>0 ? PERGUNTAS[novoIdx-1].bloco : null;
  if(blocoAtual!==blocoAnterior){ idx=novoIdx; telaIntroBloco(); }
  else { idx=novoIdx; telaPergunta(); }
}

    const btn=document.createElement('button');

    btn.onclick=()=>responder(i,btn);cont.appendChild(btn);
  });
}

function responder(i,btn){
  if(respondeu)return;respondeu=true;
  const p=PERGUNTAS[idx];
  [...document.querySelectorAll('.opcao')].forEach((b,j)=>{
    b.classList.add('bloqueada');
    if(j===p.correta){b.classList.add('certa');b.classList.add('bsel');}
    else if(j===i)b.classList.add('errada');
    else b.classList.add('atenuada');
  });
  const acertou = (i===p.correta);
  if(acertou)pontos++;
  detalhe.push({nivel:p.nivel,tema:p.tema,bloco:p.bloco,acertou:acertou});
  const exp=document.getElementById('exp');
  exp.innerHTML=(acertou?'<b>Correto.</b> ':'<b>A resposta certa está destacada.</b> ')+p.explica+
    (p.fonte?`<span class="fonte">Fonte: ${p.fonte}</span>`:'');
  exp.classList.add('show');
  const prox=document.getElementById('prox');
  prox.style.display='block';
  prox.onclick=()=>irPara(idx+1);
}

function faixa(p){
  const r=p/PERGUNTAS.length;
  if(r>=0.85)return{txt:"Você manja muito de saúde e clima",cor:"var(--verde-esc)"};
  if(r>=0.6)return{txt:"Bom conhecimento, dá pra ir além",cor:"var(--azul)"};
  if(r>=0.4)return{txt:"Você sabe o básico, vale aprofundar",cor:"var(--laranja)"};
  return{txt:"Tema novo pra você, ótima hora de aprender",cor:"var(--vermelho)"};
}

function mostrarComparacao(){
  const max=PERGUNTAS.length;
  db.ref(RKEY+'/participantes').once('value',snap=>{
    const arr=[];snap.forEach(c=>arr.push(c.val()));
    const n=arr.length;
    if(!n){return;}
    const mediaPct=Math.round(arr.reduce((s,p)=>s+p.pontos,0)/n/max*100);
    const meuPct=Math.round(pontos/max*100);
    const gp=document.getElementById('grupoPct'), gn=document.getElementById('grupoN'), msg=document.getElementById('compMsg');
    if(gp)gp.textContent=mediaPct+'%';
    if(gn)gn.textContent=n;
    if(msg){
      if(n===1) msg.textContent='Você é a primeira pessoa a participar. Conforme mais gente responde, a média do grupo aparece aqui.';
      else if(meuPct>mediaPct) msg.textContent='Você acertou acima da média do grupo.';
      else if(meuPct<mediaPct) msg.textContent='Você ficou abaixo da média do grupo, vale revisar os temas.';
      else msg.textContent='Você acertou exatamente na média do grupo.';
    }
  });
}

function salvarResultado(){
  const porNivel={facil:{a:0,t:0},medio:{a:0,t:0},dificil:{a:0,t:0}};
  const porTema={};
  const porBloco={};
  detalhe.forEach(d=>{
    porNivel[d.nivel].t++; if(d.acertou)porNivel[d.nivel].a++;
    if(!porTema[d.tema])porTema[d.tema]={a:0,t:0};
    porTema[d.tema].t++; if(d.acertou)porTema[d.tema].a++;
    if(!porBloco[d.bloco])porBloco[d.bloco]={a:0,t:0};
    porBloco[d.bloco].t++; if(d.acertou)porBloco[d.bloco].a++;
  });
  db.ref(RKEY+'/participantes').push({nome:nome,pontos:pontos,total:PERGUNTAS.length,nivel:porNivel,tema:porTema,bloco:porBloco,ts:Date.now()})
    .then(()=>{document.getElementById('salvomsg').textContent='Seu resultado entrou nas estatísticas do grupo.';mostrarComparacao();})
    .catch(()=>{document.getElementById('salvomsg').textContent='Não foi possível registrar agora.';});
}

function enviarSugestao(){
  const t=document.getElementById('sug').value.trim();
  if(!t){document.getElementById('sug').focus();return;}
  if(!firebaseOk){document.getElementById('sugmsg').textContent='Modo offline: sugestão não enviada.';return;}
  db.ref(RKEY+'/sugestoes').push({nome:nome,texto:t,ts:Date.now()})
    .then(()=>{document.getElementById('sug').value='';document.getElementById('sugmsg').textContent='Sugestão enviada. Obrigado!';
      document.getElementById('enviarsug').disabled=true;})
    .catch(()=>{document.getElementById('sugmsg').textContent='Não foi possível enviar agora.';});
}

    <div class="rodape">Conferência Municipal de Saúde${cidadeNome?(' · '+escapeHtml(cidadeNome)):''}</div>`;
  if(!modoPainel)document.getElementById('voltar').onclick=telaInicial;
  if(!firebaseOk){
    document.getElementById('boxstats').innerHTML='<div class="erro-cfg">Configure o Firebase para ver os resultados do evento.</div>';
    return;
  }
  db.ref(RKEY+'/participantes').on('value',snap=>{
    const arr=[];snap.forEach(c=>arr.push(c.val()));
    renderStats(arr);renderBlocos(arr);renderNiveis(arr);renderTemas(arr);renderGrafico(arr);
  });
  db.ref(RKEY+'/sugestoes').on('value',snap=>{
    const arr=[];snap.forEach(c=>arr.push(c.val()));
    renderNuvem(arr);renderSugestoes(arr);
  });
}

function renderStats(arr){
  const n=arr.length;
  const max=PERGUNTAS.length;
  const media=n?(arr.reduce((s,p)=>s+p.pontos,0)/n):0;
  const bons=arr.filter(p=>p.pontos/max>=0.6).length;
  const pctMedio=n?Math.round(media/max*100):0;
  const aviso = n===1 ? '<div class="hint" style="margin-top:12px">Apenas 1 participante até agora. Os percentuais refletem essa única pessoa e vão se ajustar conforme o grupo cresce.</div>' : (n===0?'<div class="hint" style="margin-top:12px">Ainda sem participantes.</div>':'');
  document.getElementById('boxstats').innerHTML=`
    <div class="stat-linha">
      <div class="stat"><div class="v">${n}</div><div class="l">participantes</div></div>
      <div class="stat"><div class="v">${pctMedio}%</div><div class="l">acerto médio do grupo</div></div>
      <div class="stat"><div class="v">${n?Math.round(bons/n*100):0}%</div><div class="l">acertaram 60%+</div></div>
    </div>${aviso}`;
}

function renderBlocos(arr){
  const ac={};
  ORDEM_BLOCOS.forEach(k=>ac[k]={a:0,t:0});
  arr.forEach(p=>{
    if(!p.bloco)return;
    Object.keys(p.bloco).forEach(k=>{
      if(!ac[k])ac[k]={a:0,t:0};
      ac[k].a+=p.bloco[k].a||0;ac[k].t+=p.bloco[k].t||0;
    });
  });
  const html=ORDEM_BLOCOS.map(k=>{
    const b=BLOCOS[k];const v=ac[k];
    const pc=v.t?Math.round(v.a/v.t*100):0;
    return `<div class="bloco-result" style="--bcor:${b.cor};--bsuave:${b.suave};--bcoresc:${b.corEsc}">
      <div class="br-topo"><span class="br-nome">${b.nome}</span><span class="br-pc">${pc}%</span></div>
      <div class="br-trilho"><div class="br-fill" style="width:${pc}%"></div></div>
      <div class="br-det">${v.a} de ${v.t} acertos</div>
    </div>`;
  }).join('');
  document.getElementById('boxblocos').innerHTML=html;
}

function renderNiveis(arr){
  const ac={facil:{a:0,t:0},medio:{a:0,t:0},dificil:{a:0,t:0}};
  arr.forEach(p=>{
    if(!p.nivel)return;
    ['facil','medio','dificil'].forEach(k=>{
      if(p.nivel[k]){ac[k].a+=p.nivel[k].a||0;ac[k].t+=p.nivel[k].t||0;}
    });
  });
  const pc=k=>ac[k].t?Math.round(ac[k].a/ac[k].t*100):0;
  document.getElementById('boxniveis').innerHTML=`
    <div class="nivel-grid">
      <div class="nivel-box b"><div class="pc">${pc('facil')}%</div><div class="nm">Básico</div><div class="det">${ac.facil.a}/${ac.facil.t} acertos</div></div>
      <div class="nivel-box m"><div class="pc">${pc('medio')}%</div><div class="nm">Médio</div><div class="det">${ac.medio.a}/${ac.medio.t} acertos</div></div>
      <div class="nivel-box av"><div class="pc">${pc('dificil')}%</div><div class="nm">Avançado</div><div class="det">${ac.dificil.a}/${ac.dificil.t} acertos</div></div>
    </div>`;
}

function corPct(p){ if(p>=70)return'#1b9e54'; if(p>=45)return'#f0a830'; return'#e0463a'; }
function renderTemas(arr){
  const ac={};
  arr.forEach(p=>{
    if(!p.tema)return;
    Object.keys(p.tema).forEach(k=>{
      if(!ac[k])ac[k]={a:0,t:0};
      ac[k].a+=p.tema[k].a||0;ac[k].t+=p.tema[k].t||0;
    });
  });
  const linhas=Object.entries(ac).map(([k,v])=>({tema:k,pc:v.t?Math.round(v.a/v.t*100):0,a:v.a,t:v.t}))
    .sort((a,b)=>b.pc-a.pc);
  if(!linhas.length){document.getElementById('boxtemas').innerHTML='<div class="hint">Sem dados ainda.</div>';return;}
  document.getElementById('boxtemas').innerHTML=linhas.map(l=>`
    <div class="tema-linha">
      <div class="tema-topo"><span class="tt">${escapeHtml(l.tema)}</span><span class="tp">${l.pc}%</span></div>
      <div class="tema-trilho"><div class="tema-fill" style="width:${l.pc}%;background:${corPct(l.pc)}"></div></div>
    </div>`).join('');
}

function renderGrafico(arr){
  const max=PERGUNTAS.length;
  const cont=Array(max+1).fill(0);
  arr.forEach(p=>{if(p.pontos>=0&&p.pontos<=max)cont[p.pontos]++;});
  const maior=Math.max(1,...cont);
  let html='';
  for(let i=max;i>=0;i--){
    const w=Math.round(cont[i]/maior*100);
    html+=`<div class="gbar-linha"><div class="gbar-rot">${i}/${max}</div>
      <div class="gbar-trilho"><div class="gbar-fill" style="width:${w}%"></div></div>
      <div class="gbar-num">${cont[i]}</div></div>`;
  }
  document.getElementById('boxgraf').innerHTML=html||'<div class="hint">Sem dados ainda.</div>';
}

const STOP=new Set(['a','o','as','os','de','da','do','das','dos','e','em','no','na','nos','nas','um','uma','para','pra','por','com','que','mais','meu','minha','se','ao','aos','é','the','of','sua','seu','tem','ter','muito','isso','esse','essa','mas','não','nao','só','sao','são','dos','nas','como','onde','quando','também','tambem','toda','todo','todas','todos','ser','estar','foi','tão','tao','até','ate','sem','sobre']);
function renderNuvem(arr){
  // conta cada palavra UMA vez por sugestão, para uma pessoa não inflar um termo repetindo-o
  const freq={};
  arr.forEach(s=>{
    const vistas=new Set();
    (s.texto||'').toLowerCase().replace(/[.,;:!?()"]/g,' ').split(/\s+/).forEach(w=>{
      w=w.trim();
      if(w.length>=4 && !STOP.has(w)) vistas.add(w);
    });
    vistas.forEach(w=>{freq[w]=(freq[w]||0)+1;});
  });
  const pares=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,30);
  if(!pares.length){document.getElementById('boxnuvem').innerHTML='<div class="hint">Sem sugestões ainda.</div>';return;}
  const maxf=pares[0][1];
  const minf=pares[pares.length-1][1];
  document.getElementById('boxnuvem').innerHTML=pares.map(([w,f])=>{
    // só varia o tamanho quando há diferença real de frequência entre as palavras
    let t;
    if(maxf===minf) t=0;                       // todas iguais: tamanho uniforme
    else t=(f-minf)/(maxf-minf);               // normaliza 0..1
    const size=17+Math.round(t*17);            // 17px a 34px, faixa mais suave
    const op=0.7+0.3*t;
    return `<span style="font-size:${size}px;opacity:${op.toFixed(2)}">${escapeHtml(w)} <span style="font-size:11px;opacity:.6;font-weight:400">${f>1?'('+f+')':''}</span></span>`;
  }).join('');
}

function renderSugestoes(arr){
  const ord=arr.slice().sort((a,b)=>b.ts-a.ts).slice(0,40);
  if(!ord.length){document.getElementById('boxsug').innerHTML='<div class="hint">Sem sugestões ainda.</div>';return;}
  document.getElementById('boxsug').innerHTML=ord.map(s=>
    `<div class="sugcard">${escapeHtml(s.texto)}<span class="fonte">— ${escapeHtml(s.nome||'anônimo')}</span></div>`).join('');
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function desenhaParticipante(){

function ligaParticipante(m){
  const enviar=(valor)=>{
    db.ref(MENTI_RKEY+'/respostas/'+mIdx).push({v:valor,ts:Date.now()})
      .then(()=>{mRespondi[mIdx]=true;desenhaParticipante();})
      .catch(()=>{});
  };
  if(m.tipo==='nuvem'){
    document.getElementById('menvia').onclick=()=>{
      const w=(document.getElementById('mword').value||'').trim();
      if(!w)return; enviar(w.toLowerCase());

    [...document.querySelectorAll('.mopt')].forEach(b=>b.onclick=()=>enviar(parseInt(b.dataset.i)));

    const r=document.getElementById('mrange'),v=document.getElementById('mval');
    r.oninput=()=>v.textContent=r.value;
    document.getElementById('menvia').onclick=()=>enviar(parseInt(r.value));

    [...document.querySelectorAll('.reixo')].forEach(r=>r.oninput=()=>{document.getElementById('rn'+r.dataset.i).textContent=r.value;});
    document.getElementById('menvia').onclick=()=>{
      const vals=m.eixos.map((e,i)=>parseInt(document.querySelector('.reixo[data-i="'+i+'"]').value)||0);
      enviar(vals);
    };

}

/* ---------- VISUALIZAÇÕES (SVG puro, sem libs) ---------- */
function vizNuvem(arr){
  const freq={};
  arr.forEach(w=>{ w=String(w).trim().toLowerCase(); if(w)freq[w]=(freq[w]||0)+1; });
  const pares=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,40);
  const maxf=pares[0][1], minf=pares[pares.length-1][1];
  const cores=["#8a4fd6","#1f7ae0","#1b9e54","#e0463a","#f0a830","#0f9b8e"];
  const palavras=pares.map(([w,f],k)=>{
    const t=maxf===minf?0.5:(f-minf)/(maxf-minf);
    const size=20+Math.round(t*44);
    return `<span style="font-size:${size}px;color:${cores[k%cores.length]};font-weight:700;line-height:1.1">${escapeHtml(w)}</span>`;
  }).join(' ');
  return `<div style="font-size:13px;color:var(--cinza);margin-bottom:10px">${arr.length} respostas</div>
    <div class="menti-nuvem">${palavras}</div>`;
}
function vizBarras(arr,m){
  const cont=m.opcoes.map(()=>0);
  arr.forEach(v=>{ if(v>=0&&v<cont.length)cont[v]++; });
  const total=arr.length, maior=Math.max(1,...cont);
  const linhas=m.opcoes.map((o,i)=>{
    const w=Math.round(cont[i]/maior*100);
    const pc=total?Math.round(cont[i]/total*100):0;
    return `<div class="mb-linha"><div class="mb-rot">${escapeHtml(o)}</div>
      <div class="mb-trilho"><div class="mb-fill" style="width:${w}%;background:${m.cores[i]}"></div></div>
      <div class="mb-num">${cont[i]} · ${pc}%</div></div>`;
  }).join('');
  return `<div style="font-size:13px;color:var(--cinza);margin-bottom:10px">${total} respostas</div>${linhas}`;
}
function vizPizza(arr,m){
  const cont=m.opcoes.map(()=>0);
  arr.forEach(v=>{ if(v>=0&&v<cont.length)cont[v]++; });
  const total=arr.length||1;
  let ang=-90, fatias='';
  const cx=130,cy=130,r=110;
  m.opcoes.forEach((o,i)=>{
    const frac=cont[i]/total; if(frac<=0)return;
    const a2=ang+frac*360;
    const x1=cx+r*Math.cos(Math.PI*ang/180), y1=cy+r*Math.sin(Math.PI*ang/180);
    const x2=cx+r*Math.cos(Math.PI*a2/180),  y2=cy+r*Math.sin(Math.PI*a2/180);
    const big=frac>0.5?1:0;
    fatias+=`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${big} 1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${m.cores[i]}"></path>`;
    ang=a2;
  });
  const leg=m.opcoes.map((o,i)=>{
    const pc=Math.round(cont[i]/total*100);
    return `<div class="pz-leg"><span class="pz-cor" style="background:${m.cores[i]}"></span>${escapeHtml(o)} — <b>${pc}%</b> (${cont[i]})</div>`;
  }).join('');
  return `<div style="font-size:13px;color:var(--cinza);margin-bottom:10px">${arr.length} respostas</div>
    <div class="pz-wrap"><svg viewBox="0 0 260 260" class="pz-svg">${fatias}</svg><div class="pz-legs">${leg}</div></div>`;
}
function vizEscala(arr,m){
  const nums=arr.map(Number).filter(n=>!isNaN(n));
  const media=nums.length?(nums.reduce((a,b)=>a+b,0)/nums.length):0;
  const cont={}; for(let i=m.min;i<=m.max;i++)cont[i]=0;
  nums.forEach(n=>{ if(n>=m.min&&n<=m.max)cont[n]++; });
  const maior=Math.max(1,...Object.values(cont));
  let barras='';
  for(let i=m.min;i<=m.max;i++){
    const h=Math.round(cont[i]/maior*100);
    barras+=`<div class="es-col"><div class="es-bar" style="height:${h}%;background:${m.cor}"></div><div class="es-rot">${i}</div></div>`;
  }
  return `<div class="es-media" style="color:${m.cor}">${media.toFixed(1)}<span> média · ${nums.length} respostas</span></div>
    <div class="es-graf">${barras}</div>`;
}
function vizRadar(arr,m){
  const n=m.eixos.length;
  const soma=m.eixos.map(()=>0), cnt=m.eixos.map(()=>0);
  arr.forEach(v=>{ if(Array.isArray(v))v.forEach((x,i)=>{ if(i<n){soma[i]+=Number(x)||0;cnt[i]++;} }); });
  const med=m.eixos.map((e,i)=>cnt[i]?soma[i]/cnt[i]:0);
  const cx=150,cy=140,R=105;
  const pt=(i,val)=>{
    const ang=-Math.PI/2 + i*2*Math.PI/n;
    const rr=R*(val-m.min)/(m.max-m.min);
    return [cx+rr*Math.cos(ang), cy+rr*Math.sin(ang)];
  };
  let grade='';
  [0.25,0.5,0.75,1].forEach(f=>{
    const pts=m.eixos.map((e,i)=>{const p=pt(i,m.min+f*(m.max-m.min));return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
    grade+=`<polygon points="${pts}" fill="none" stroke="#e0e6e2" stroke-width="1"></polygon>`;
  });
  let eixos='';
  m.eixos.forEach((e,i)=>{
    const p=pt(i,m.max);
    eixos+=`<line x1="${cx}" y1="${cy}" x2="${p[0].toFixed(1)}" y2="${p[1].toFixed(1)}" stroke="#e0e6e2"></line>`;
    const lp=pt(i,m.max*1.16);
    eixos+=`<text x="${lp[0].toFixed(1)}" y="${lp[1].toFixed(1)}" font-size="13" fill="#2c3a42" text-anchor="middle" dominant-baseline="middle">${escapeHtml(e)}</text>`;
  });
  const poly=m.eixos.map((e,i)=>{const p=pt(i,med[i]);return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
  const leg=m.eixos.map((e,i)=>`<span class="rd-leg">${escapeHtml(e)}: <b>${med[i].toFixed(1)}</b></span>`).join('');
  return `<div style="font-size:13px;color:var(--cinza);margin-bottom:6px">${arr.length} respostas</div>
    <svg viewBox="0 0 300 300" class="rd-svg">${grade}${eixos}
      <polygon points="${poly}" fill="${m.cor}33" stroke="${m.cor}" stroke-width="2.5"></polygon></svg>
    <div class="rd-legs">${leg}</div>`;
}

/* ---------- APRESENTADOR ---------- */
function mentiAdmin(){
  if(!chaveOk){
    app.innerHTML=`<div class="topo"><span class="tag">Apresentador</span><h1>Acesso restrito</h1>
      <p class="sub">Este painel precisa da chave de apresentador no link.</p></div>
      <div class="card"><label for="ch">Digite a chave</label>
      <input type="text" id="ch" placeholder="chave"><button class="btn btn-verde" id="okch">Entrar</button></div>`;
    document.getElementById('okch').onclick=()=>{
      const v=document.getElementById('ch').value.trim();
      location.href=mentiUrl('menti-admin')+'&chave='+encodeURIComponent(v);
    };
    return;
  }
  if(!firebaseOk){ app.innerHTML='<div class="wrap"><div class="card"><div class="erro-cfg">Firebase não configurado.</div></div></div>'; return; }
  db.ref(MENTI_RKEY+'/ativa').on('value',s=>{
    const a=s.val(); mIdx=(a===null||a===undefined)?-1:a;
    desenhaAdmin();
  });
}
function desenhaAdmin(){
  const atualTxt = mIdx<0 ? 'Nenhuma (tela de espera)' : `Pergunta ${mIdx+1}: ${MENTI[mIdx].tipo}`;
  const lista=MENTI.map((m,i)=>`<button class="adm-q ${i===mIdx?'ativa':''}" data-i="${i}">
    <span class="adm-n">${i+1}</span><span class="adm-t">${escapeHtml(m.q)}</span><span class="adm-tipo">${m.tipo}</span></button>`).join('');
  app.innerHTML=`
    <div class="topo"><span class="tag" style="background:#127a40;color:#fff">Apresentador</span>
      <h1>Controle do Mentimeter</h1><p class="sub">No ar: <b>${atualTxt}</b></p></div>
    <div class="card">
      <div class="adm-nav">
        <button class="btn btn-claro" id="prev">‹ Anterior</button>
        <button class="btn btn-verde" id="next">Próxima ›</button>
      </div>
      <button class="btn btn-claro" id="espera" style="margin-top:10px">Tela de espera</button>
      <button class="btn btn-claro" id="zerar" style="margin-top:10px">Apagar respostas desta pergunta</button>
    </div>
    <div class="card"><div class="secao-tit" style="margin-top:0">Ir direto para</div>${lista}</div>
    <div class="card">
      <div class="secao-tit" style="margin-top:0">Links para projetar e divulgar</div>
      <p class="hint" style="text-align:left">Telão (projete este): <span class="url-mini" style="text-align:left">${mentiUrl('menti-telao')}</span></p>
      <p class="hint" style="text-align:left">Participantes (QR / link): <span class="url-mini" style="text-align:left">${mentiUrl('menti')}</span></p>
      <div id="qrparti" style="display:flex;justify-content:center;margin-top:8px"></div>
    </div>`;
  const setAtiva=(i)=>db.ref(MENTI_RKEY+'/ativa').set(i);
  document.getElementById('prev').onclick=()=>setAtiva(Math.max(-1,mIdx-1));
  document.getElementById('next').onclick=()=>setAtiva(Math.min(MENTI.length-1,mIdx+1));
  document.getElementById('espera').onclick=()=>setAtiva(-1);
  document.getElementById('zerar').onclick=()=>{ if(mIdx>=0&&confirm('Apagar todas as respostas da pergunta '+(mIdx+1)+'?'))db.ref(MENTI_RKEY+'/respostas/'+mIdx).remove(); };
  [...document.querySelectorAll('.adm-q')].forEach(b=>b.onclick=()=>setAtiva(parseInt(b.dataset.i)));
  try{ new QRCode(document.getElementById('qrparti'),{text:mentiUrl('menti'),width:150,height:150,colorDark:'#127a40',colorLight:'#fff'}); }catch(e){}
}

if(modoMenti==='menti') mentiParticipante();
else if(modoMenti==='menti-telao') mentiTelao();
else if(modoMenti==='menti-admin') mentiAdmin();
else if(modoPainel)telaPainel();
else telaInicial();
</script>
